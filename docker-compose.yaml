services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: gateway
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: gateway
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gateway"]
      interval: 3s
      timeout: 3s
      retries: 10

  gateway:
    build: .
    volumes:
      - ./config.yaml:/config/config.yaml
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://gateway:gateway@postgres:5432/gateway?sslmode=disable
      GATEWAY_URL: http://gateway:8080
      KEYCLOAK_URL: http://keycloak:8180
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 3s
      timeout: 3s
      retries: 10

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      gateway:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v3.4.1
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      gateway:
        condition: service_healthy

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8180
    ports:
      - "8180:8180"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    healthcheck:
      test: ["CMD-SHELL", "cat < /dev/null > /dev/tcp/localhost/8180 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  jaeger:
    image: jaegertracing/jaeger:2.6.0
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"   # Jaeger UI
      - "4318:4318"     # OTLP HTTP receiver
    volumes:
      - jaeger-data:/badger

  grafana:
    image: grafana/grafana:11.6.0
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ALLOW_EMBEDDING=true
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  agent-translator:
    build:
      context: .
      dockerfile: Dockerfile.mock-agent
    environment:
      AGENT_NAME: translator
      AGENT_DESCRIPTION: "Translates text between languages with high accuracy. Supports multiple language pairs including English, Japanese, Spanish, French, German, Chinese."
      AGENT_URL: http://agent-translator:9001
      AGENT_SKILLS: "translate,localize"
      REGISTRY_URL: http://gateway:8080
      GATEWAY_URL: http://gateway:8080
      LISTEN: ":9001"
      KEYCLOAK_URL: http://keycloak:8180
      KEYCLOAK_CLIENT_ID: agent-translator
      KEYCLOAK_CLIENT_SECRET: translator-secret
    expose:
      - "9001"
    depends_on:
      gateway:
        condition: service_healthy

  agent-summarizer:
    build:
      context: .
      dockerfile: Dockerfile.mock-agent
    environment:
      AGENT_NAME: summarizer
      AGENT_DESCRIPTION: "Summarizes documents and extracts key points. Produces concise summaries of long texts, reports, and articles."
      AGENT_URL: http://agent-summarizer:9001
      AGENT_SKILLS: "summarize,extract key points"
      REGISTRY_URL: http://gateway:8080
      GATEWAY_URL: http://gateway:8080
      LISTEN: ":9001"
      KEYCLOAK_URL: http://keycloak:8180
      KEYCLOAK_CLIENT_ID: agent-summarizer
      KEYCLOAK_CLIENT_SECRET: summarizer-secret
    expose:
      - "9001"
    depends_on:
      gateway:
        condition: service_healthy

  agent-code-reviewer:
    build:
      context: .
      dockerfile: Dockerfile.mock-agent
    environment:
      AGENT_NAME: code-reviewer
      AGENT_DESCRIPTION: "Reviews code and suggests improvements. Analyzes code quality, finds bugs, suggests refactoring, and checks for security vulnerabilities."
      AGENT_URL: http://agent-code-reviewer:9001
      AGENT_SKILLS: "review code,suggest fixes,find bugs"
      REGISTRY_URL: http://gateway:8080
      GATEWAY_URL: http://gateway:8080
      LISTEN: ":9001"
      DELEGATE_KEYWORD: "translate"
      DELEGATE_QUERY: "translate text to another language"
      KEYCLOAK_URL: http://keycloak:8180
      KEYCLOAK_CLIENT_ID: agent-code-reviewer
      KEYCLOAK_CLIENT_SECRET: code-reviewer-secret
    expose:
      - "9001"
    depends_on:
      gateway:
        condition: service_healthy

  agent-sentiment:
    build:
      context: .
      dockerfile: Dockerfile.mock-agent
    environment:
      AGENT_NAME: sentiment-analyzer
      AGENT_DESCRIPTION: "Analyzes the emotional tone and sentiment of text. Detects positive, negative, and neutral sentiment. Performs opinion mining and emotion classification."
      AGENT_URL: http://agent-sentiment:9001
      AGENT_SKILLS: "sentiment analysis,emotion detection,opinion mining"
      REGISTRY_URL: http://gateway:8080
      GATEWAY_URL: http://gateway:8080
      LISTEN: ":9001"
      KEYCLOAK_URL: http://keycloak:8180
      KEYCLOAK_CLIENT_ID: agent-sentiment-analyzer
      KEYCLOAK_CLIENT_SECRET: sentiment-analyzer-secret
    expose:
      - "9001"
    depends_on:
      gateway:
        condition: service_healthy

  agent-data-extractor:
    build:
      context: .
      dockerfile: Dockerfile.mock-agent
    environment:
      AGENT_NAME: data-extractor
      AGENT_DESCRIPTION: "Extracts structured data from unstructured text. Parses emails, dates, phone numbers, addresses, names, and entities from documents."
      AGENT_URL: http://agent-data-extractor:9001
      AGENT_SKILLS: "entity extraction,data parsing,NER,structured output"
      REGISTRY_URL: http://gateway:8080
      GATEWAY_URL: http://gateway:8080
      LISTEN: ":9001"
      KEYCLOAK_URL: http://keycloak:8180
      KEYCLOAK_CLIENT_ID: agent-data-extractor
      KEYCLOAK_CLIENT_SECRET: data-extractor-secret
    expose:
      - "9001"
    depends_on:
      gateway:
        condition: service_healthy

  agent-content-writer:
    build:
      context: .
      dockerfile: Dockerfile.mock-agent
    environment:
      AGENT_NAME: content-writer
      AGENT_DESCRIPTION: "Creates high-quality written content. Writes blog posts, marketing copy, product descriptions, emails, and creative fiction."
      AGENT_URL: http://agent-content-writer:9001
      AGENT_SKILLS: "copywriting,blog writing,creative writing,email drafting"
      REGISTRY_URL: http://gateway:8080
      GATEWAY_URL: http://gateway:8080
      LISTEN: ":9001"
      DELEGATE_KEYWORD: "translate"
      DELEGATE_QUERY: "translate text to another language"
      KEYCLOAK_URL: http://keycloak:8180
      KEYCLOAK_CLIENT_ID: agent-content-writer
      KEYCLOAK_CLIENT_SECRET: content-writer-secret
    expose:
      - "9001"
    depends_on:
      gateway:
        condition: service_healthy

  agent-math-solver:
    build:
      context: .
      dockerfile: Dockerfile.mock-agent
    environment:
      AGENT_NAME: math-solver
      AGENT_DESCRIPTION: "Solves mathematical problems. Handles arithmetic, algebra, calculus, statistics, and equation solving. Shows step-by-step solutions."
      AGENT_URL: http://agent-math-solver:9001
      AGENT_SKILLS: "math,algebra,calculus,statistics,equation solving"
      REGISTRY_URL: http://gateway:8080
      GATEWAY_URL: http://gateway:8080
      LISTEN: ":9001"
      KEYCLOAK_URL: http://keycloak:8180
      KEYCLOAK_CLIENT_ID: agent-math-solver
      KEYCLOAK_CLIENT_SECRET: math-solver-secret
    expose:
      - "9001"
    depends_on:
      gateway:
        condition: service_healthy

  agent-security-scanner:
    build:
      context: .
      dockerfile: Dockerfile.mock-agent
    environment:
      AGENT_NAME: security-scanner
      AGENT_DESCRIPTION: "Scans code and configurations for security vulnerabilities. Detects SQL injection, XSS, CSRF, authentication flaws, and OWASP Top 10 issues."
      AGENT_URL: http://agent-security-scanner:9001
      AGENT_SKILLS: "vulnerability scanning,OWASP,security audit,penetration testing"
      REGISTRY_URL: http://gateway:8080
      GATEWAY_URL: http://gateway:8080
      LISTEN: ":9001"
      DELEGATE_KEYWORD: "summarize"
      DELEGATE_QUERY: "summarize document into key points"
      KEYCLOAK_URL: http://keycloak:8180
      KEYCLOAK_CLIENT_ID: agent-security-scanner
      KEYCLOAK_CLIENT_SECRET: security-scanner-secret
    expose:
      - "9001"
    depends_on:
      gateway:
        condition: service_healthy

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:
  jaeger-data:
