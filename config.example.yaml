listen: ":8080"
database_url: "postgres://gateway:gateway@localhost:5432/gateway?sslmode=disable"

# Balancer strategy: "weighted" (default), "latency", or "priority"
balancer_strategy: "weighted"

# Jaeger OTLP endpoint for distributed tracing (empty = disabled)
jaeger_url: "jaeger:4318"

# Embedding model used for semantic agent discovery
embedding_model: "google/gemini-embedding-001"

# Gateway URL for self-calls (embeddings). In Docker: "http://gateway:8080"
gateway_url: "http://localhost:8080"

# Providers listed here are seeded into the database on first startup.
# Once in the DB, manage them via the API — changes here won't overwrite DB state.
providers:
  - name: openai-primary
    url: https://api.openai.com
    key_env: OPENAI_API_KEY
    models:
      - gpt-4o
      - gpt-4o-mini
    weight: 2
    priority: 1
    timeout_seconds: 120
    price_per_input_token: 0.0000025
    price_per_output_token: 0.00001
    rate_limit_rpm: 500

  - name: openai-secondary
    url: https://api.openai.com
    key_env: OPENAI_API_KEY_2
    models:
      - gpt-4o
    weight: 1
    priority: 2
    timeout_seconds: 120
    price_per_input_token: 0.0000025
    price_per_output_token: 0.00001

  - name: anthropic
    url: https://api.anthropic.com
    key_env: ANTHROPIC_API_KEY
    models:
      - claude-sonnet-4-20250514
    weight: 1
    priority: 1
    timeout_seconds: 120
    price_per_input_token: 0.000003
    price_per_output_token: 0.000015

  - name: openrouter
    url: https://openrouter.ai/api
    key_env: OPENROUTER_API_KEY
    models:
      - google/gemini-embedding-001
    weight: 1
    priority: 1
    timeout_seconds: 30
